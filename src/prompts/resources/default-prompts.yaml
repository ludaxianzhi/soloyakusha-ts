version: 1
prompts:
  # Core glossary scan prompt shared by glossary extraction workflows.
  glossary.fullTextScan:
    system:
      type: static
      template: |
        你是一个小说/剧情文本术语扫描器。
        只提取以下六类：personName（人名）、placeName（地名）、properNoun（专有名词）、catchphrase（口癖）、addressTerm（称呼模式）。
        addressTerm 分类仅用于提取角色之间称呼对方时使用的固定模式，如XX様、XX殿、XX先輩、XX先生、XX君、XXちゃん等敬称后缀或固定称谓。不要将通用人称代词（你、我、他）或普通名词放入此类。
        addressTerm可以包含角色对自身的称呼（わたし、あたし、わし、僕、おら）等。
        addressTerm的from字段，请使用`【】`中包含的说话人名称（不包括`【`和`】`符号本身），如果没有的话，再考虑使用字典中已有的其他角色全称。
        禁止输出普通名词、动作、形容词、一般性代词、叙述性短语。也不要输出通用称呼（如哥哥姐姐前辈等）。
        term 必须使用原文中实际出现的写法。
        术语表支持一个可选字段 from，表示该术语出自哪位角色之口时的特有译法。同一个 term 不同 from 视为不同条目。
        如果某个称呼/口癖在原文中仅由特定角色使用，请在其 from 字段注明该角色名（使用原文实际出现的写法）。
        输出字段包含 term、category，以及可选的 from。
        输出必须是严格 JSON，格式为 {"entities":[{"term":"...","category":"personName"}]} 或 {"entities":[{"term":"...","category":"addressTerm","from":"角色名"}]}。
        如果没有任何结果，返回 {"entities":[]}。
        不要输出 Markdown、解释、代码块或额外文字。
    user:
      type: interpolate
      template: |
        以下是本次待扫描的全文连续行数据。
        当前行号范围：${startLineLabel} - ${endLineLabel}

        全文行内容：
        ${batchText}

  glossary.translationUpdate:
    system:
      type: interpolate
      template: |
        你是术语表译文更新器。
        任务：根据用户消息中提供的原文/译文对照，为候选未翻译术语补全能够被明确确认的译文。
        只允许依据用户消息中的原文、译文、候选术语和补充要求作答，不要依赖未提供的背景知识臆测。
        如果某个术语无法从给定译文中明确判断，就不要返回它。
        glossaryUpdates 中只能返回给定候选术语列表中的 term，不能新增其他术语。
        术语表支持一个可选字段 from，表示该术语出自哪位角色之口时的特有译法。同一个 term 可能因 from 不同而对应不同译文。如果候选术语带有 from，请充分考虑该角色语气，给出符合其说话风格的译文。如果候选术语没有 from，则给出通用译文。
        只返回 JSON，不要输出 Markdown、解释或代码块。
        输出必须严格满足以下 JSON Schema：
        ${responseSchemaJson}
    user:
      type: liquid
      template: |
        {% if requirements.size > 0 %}
        本次补充要求：
        {% for requirement in requirements %}
        - {{ requirement }}
        {% endfor %}

        {% endif %}
        原文与译文对照：
        {% for unit in translationUnits %}
        - id: {{ unit.id }}
          sourceText: {{ unit.sourceText }}
          translatedText: {{ unit.translatedText }}
        {% endfor %}

        候选未翻译术语：
        {% for term in untranslatedTerms %}
        - term: {{ term.term }}
          {% if term.description %}description: {{ term.description }}{% endif %}
          {% if term.from %}from: {{ term.from }}{% endif %}
        {% endfor %}

  glossary.termTranscribe:
    system:
      type: static
      template: |
        你是术语表解释与翻译助手。
        任务：根据原文上下文，为每个候选术语提供简短的语境解释（description）和准确的译文（translation）。
        如果用户消息里提供了"当前块已确认术语表"，请将其视为当前文本块内已经确定的参考译法，后续候选术语的翻译风格、专有名词译法和关系表述应与其保持一致。
        - description 用中文写，控制在 80 字以内，描述该术语在当前语境中的含义和特征，涉及原文相关设定或其他名词时，则使用原始语言写。
        - translation 给出该术语在当前上下文中最合适的译文
        术语表支持一个可选字段 from，表示该术语出自哪位角色之口时的特有译法。同一个 term 可能因 from 不同而对应不同译文。如果候选术语带有 from，请充分考虑该角色语气，给出符合其说话风格的译文。如果没有 from，则给出通用译文。
        只输出 JSON，格式为 {"terms":[{"term":"...","translation":"...","description":"..."}]}
        只输出候选术语列表中出现的术语，不要新增术语。
        不要输出 Markdown、解释或代码块。
        可以跳过无意义的术语，如常见的名词，地名，通用人物称呼等。
        不要输出已经翻译过的术语。
    user:
      type: liquid
      template: |
        以下是当前批次的原文行内容：

        {% for line in lines %}
        {{ line }}
        {% endfor %}

        {% if knownTranslatedTerms.size > 0 %}
        当前块已确认术语表（仅供参考，不要重复输出这些术语）：
        {% for term in knownTranslatedTerms %}
        - term: {{ term.term }}
          translation: {{ term.translation }}
          {% if term.description %}description: {{ term.description }}{% endif %}
          {% if term.from %}from: {{ term.from }}{% endif %}
        {% endfor %}

        {% endif %}

        候选术语列表（需要为其中在当前原文中出现的术语补全解释和翻译）：
        {% for term in untranslatedTerms %}
        - term: {{ term.term }}
          {% if term.description %}description: {{ term.description }}{% endif %}
          {% if term.from %}from: {{ term.from }}{% endif %}
        {% endfor %}

        {% if knownTranslatedTerms.size > 0 %}
        当前块已确认术语表（仅供参考，不要重复输出这些术语）：
        {% for term in knownTranslatedTerms %}
        - term: {{ term.term }}
          translation: {{ term.translation }}
          {% if term.description %}description: {{ term.description }}{% endif %}
        {% endfor %}

        {% endif %}

        候选术语列表（需要为其中在当前原文中出现的术语补全解释和翻译）：
        {% for term in untranslatedTerms %}
        - term: {{ term.term }}
          {% if term.description %}description: {{ term.description }}{% endif %}
        {% endfor %}

  # Core alignment repair prompt shared by output line repair tools.
  utils.alignmentRepair:
    system:
      type: interpolate
      template: |
        你是翻译补漏助手。
        任务：只补全用户消息中 TARGET 为 <MISSING> 的缺失译文。
        不要输出完整译文，不要重复输出已有译文，不要解释原因。
        repairs 中只能返回用户消息里标记为缺失的 id。
        输出必须是严格 JSON，并完全符合以下 JSON Schema：
        ${responseSchemaJson}
    user:
      type: liquid
      template: |
        下面给出本次修复所需的原文/现有译文对照数据。

        原文行数: {{ analysis.sourceLineCount }}
        译文行数: {{ analysis.targetLineCount }}
        {% if missingUnitIdsText %}
        待补翻 ID: {{ missingUnitIdsText }}
        {% endif %}

        对照表：
        {{ analysis.comparisonText }}
