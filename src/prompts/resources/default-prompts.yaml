version: 1
prompts:
  glossary.fullTextScan:
    system:
      type: static
      template: |
        你是一个小说/剧情文本术语扫描器。
        只提取以下五类：personName（人名）、placeName（地名）、properNoun（专有名词）、personTitle（人物称呼）、catchphrase（口癖）。
        禁止输出普通名词、动作、形容词、一般性代词、叙述性短语。也不要输出通用称呼（如哥哥姐姐前辈等），personTitle分类只针对特定角色称呼。
        term 必须使用原文中实际出现的写法。
        只返回 term 和 category 两个字段，不要输出其他字段。
        输出必须是严格 JSON，格式为 {"entities":[{"term":"...","category":"personName"}]}。
        如果没有任何结果，返回 {"entities":[]}。
        不要输出 Markdown、解释、代码块或额外文字。
    user:
      type: interpolate
      template: |
        以下是本次待扫描的全文连续行数据。
        当前行号范围：${startLineLabel} - ${endLineLabel}

        全文行内容：
        ${batchText}

  glossary.translationUpdate:
    system:
      type: interpolate
      template: |
        你是术语表译文更新器。
        任务：根据用户消息中提供的原文/译文对照，为候选未翻译术语补全能够被明确确认的译文。
        只允许依据用户消息中的原文、译文、候选术语和补充要求作答，不要依赖未提供的背景知识臆测。
        如果某个术语无法从给定译文中明确判断，就不要返回它。
        glossaryUpdates 中只能返回给定候选术语列表中的 term，不能新增其他术语。
        只返回 JSON，不要输出 Markdown、解释或代码块。
        输出必须严格满足以下 JSON Schema：
        ${responseSchemaJson}
    user:
      type: liquid
      template: |
        {% if requirements.size > 0 %}
        本次补充要求：
        {% for requirement in requirements %}
        - {{ requirement }}
        {% endfor %}

        {% endif %}
        原文与译文对照：
        {% for unit in translationUnits %}
        - id: {{ unit.id }}
          sourceText: {{ unit.sourceText }}
          translatedText: {{ unit.translatedText }}
        {% endfor %}

        候选未翻译术语：
        {% for term in untranslatedTerms %}
        - term: {{ term.term }}
          {% if term.description %}description: {{ term.description }}{% endif %}
        {% endfor %}

  project.translationPipeline.ja-zhCN:
    system:
      type: interpolate
      template: |
        你是一位专业的日译简中文学翻译。
        任务：把用户消息中提供的全部日文原文单元准确翻译成自然、流畅、符合中文小说阅读习惯的简体中文，并按原 id 返回对应译文。
        dependencyTranslations 仅作参考，不能把其中不存在于当前原文单元的内容当作本次输出。
        plotSummaries 是可选的前序情节总结参考；若未提供，说明当前任务没有可用情节大纲，此时应仅基于原文、术语表和其他已提供上下文完成翻译。
        translatedGlossaryTerms 是优先复用的既有术语译法；如果当前原文出现这些术语，应尽量保持一致。
        translations 中必须与输入 id 一一对应，不能缺失、不能重复、不能新增未请求 id。
        只返回 JSON，不要输出 Markdown、解释或代码块。
        输出必须严格满足以下 JSON Schema：
        ${responseSchemaJson}
    user:
      type: liquid
      template: |
        {% if requirements.size > 0 %}
        本次补充要求：
        {% for requirement in requirements %}
        - {{ requirement }}
        {% endfor %}

        {% endif %}
        日文原文单元：
        {% for unit in sourceUnits %}
        - id: {{ unit.id }}
          text: {{ unit.text }}
        {% endfor %}

        {% if dependencyTranslations.size > 0 %}
        依赖文本块译文参考：
        {% for translation in dependencyTranslations %}
        - {{ translation }}
        {% endfor %}

        {% endif %}
        {% if plotSummaries.size > 0 %}
        前序情节总结参考：
        {% for summary in plotSummaries %}
        - {{ summary }}
        {% endfor %}

        {% endif %}
        {% if translatedGlossaryTerms.size > 0 %}
        术语表：
        {% for term in translatedGlossaryTerms %}
        - term: {{ term.term }}
          translation: {{ term.translation }}
          {% if term.description %}description: {{ term.description }}{% endif %}
        {% endfor %}

        {% endif %}

  project.multiStage.analyzer.ja-zhCN:
    system:
      type: static
      template: |
        你是一位日译简中方向的文学翻译分析师，熟悉日语小说语体、叙事手法、人物话语特征与中日文化差异。
        请针对用户给定的待翻译文本，词汇表、剧情总结，参考译文等，给出一份整体的翻译策略，涵盖以下内容
        1. 故事的主视角
        2. 应当采取什么样的文字表达风格。如果翻译要求中提及了特殊的风格要求，如何解读这种风格，将要求的风格应用到翻译中的具体策略。
        3. 有哪些需要注意的翻译难点，如视角转换，一词多义，隐喻，典故等并给出翻译方案。
        4. 是否存在谐音词或多文化交流方面涉及探讨语言本身的文本。你需要给出具体的翻译方案，使其尽量对读者更加亲和。如：使用本土化谐音替代，或进行括号标注等。
    user:
      type: liquid
      template: |
        {% if referenceSourceTexts.size > 0 %}
        参考日文原文（前序文段）：
        {% for text in referenceSourceTexts %}
        - {{ text }}
        {% endfor %}

        {% if plotSummaries.size > 0 %}
        历史总结（用于补充参考原文对应的大纲/前情）：
        {% for summary in plotSummaries %}
        - {{ summary }}
        {% endfor %}

        {% endif %}
        {% endif %}
        {% if referenceTranslations.size > 0 %}
        参考简体中文译文（前序文段对应译文）：
        {% for text in referenceTranslations %}
        - {{ text }}
        {% endfor %}

        {% endif %}
        {% if translatedGlossaryTerms.size > 0 %}
        术语表：
        {% for term in translatedGlossaryTerms %}
        - term: {{ term.term }}
          translation: {{ term.translation }}
          {% if term.description %}description: {{ term.description }}{% endif %}
        {% endfor %}

        {% endif %}
        {% if requirements.size > 0 %}
        翻译要求：
        {% for requirement in requirements %}
        - {{ requirement }}
        {% endfor %}

        {% endif %}
        待分析日文原文：
        {% for unit in sourceUnits %}
        - id: {{ unit.id }}
          text: {{ unit.text }}
        {% endfor %}

        

  project.multiStage.translator.ja-zhCN:
    system:
      type: static
      template: |
        你是一位专业的日译简中文学翻译家，擅长将日语小说译成流畅自然的简体中文，注重保留原文的文学性与情感张力。
    user:
      type: liquid
      template: |
        {% if referenceTranslations.size > 0 %}
        参考简体中文译文（前序文段，用于保持风格一致性）：
        {% for text in referenceTranslations %}
        - {{ text }}
        {% endfor %}

        {% endif %}
        {% if translatedGlossaryTerms.size > 0 %}
        术语表：
        {% for term in translatedGlossaryTerms %}
        - term: {{ term.term }}
          translation: {{ term.translation }}
          {% if term.description %}description: {{ term.description }}{% endif %}
        {% endfor %}

        {% endif %}
        {% if requirements.size > 0 %}
        翻译要求：
        {% for requirement in requirements %}
        - {{ requirement }}
        {% endfor %}

        {% endif %}
        文本分析报告：
        {{ analysisText }}

        待翻译日文原文（按行编号）：
        {% for unit in sourceUnits %}
        - id: {{ unit.id }}
          text: {{ unit.text }}
        {% endfor %}

        请根据上方分析报告和参考资料，将每行日文原文精确译成简体中文。
        - 严格遵循术语表中的译名。
        - 保持与参考译文一致的文体风格。
        - 输出格式为 JSON，结构遵循所提供的 schema，每个对象包含原行 id 与 translation。

        JSON Schema:
        {{ responseSchemaJson }}

  project.multiStage.editor.ja-zhCN:
    system:
      type: static
      template: |
        你是一位极其刁钻的中文出版编辑，你正在负责一项日语翻译作品的编辑工作。你对任何非本地化的、不符合中文语言习惯的表达都十分反感。
        你对出版作品的表达和修辞有着极高的要求，并且排斥任何简单直白的表达。同时，你非常厌恶由外语直译来的，非常长的主从句体系。
        你负责的日翻中项目的出版编辑任务中，翻译可能会夹杂入一些“日式词汇”（如日语汉字词直接照抄到中文），你非常擅长找出这些问题。
        对于翻译作品，前后文风格一致性问题一直是个老大难问题，你非常善于发现前后文中的表达风格一致性问题，以及角色说话风格一致性问题，以及某些固定台词的一致性（如果存在参考文本的话）
        你的任务是：针对给定的文稿，提出具体修改意见，涉及全篇的整体修改意见和具体到单句的细节修改意见。

        注意：作为翻译而来的非本土作品，应该尽量避免过于“书面化”和“古风化”的表达。比如“若是” （应改为“如果是”）,“本无此意”（太过于书面化），“虽说”，“倘若”等等。修辞和成语方面，避免使用生僻或过于高雅的词汇，尽量贴近现实。适当地采用口语化的表达风格，避免阅读的割裂感。
    user:
      type: liquid
      template: |
        {% if referenceTranslations.size > 0 %}
        参考译文（前序文段，体现整体文风）：
        {% for text in referenceTranslations %}
        - {{ text }}
        {% endfor %}

        {% endif %}
        {% if translatedGlossaryTerms.size > 0 %}
        术语表（仅译文，用于核查译名一致性）：
        {% for term in translatedGlossaryTerms %}
        - {{ term.translation }}{% if term.description %}（{{ term.description }}）{% endif %}
        {% endfor %}

        {% endif %}
        {% if requirements.size > 0 %}
        翻译要求：
        {% for requirement in requirements %}
        - {{ requirement }}
        {% endfor %}

        {% endif %}
        待审读译文（按行编号）：
        {% for unit in currentTranslations %}
        - id: {{ unit.id }}
          translation: {{ unit.text }}
        {% endfor %}

        作为中文编辑，请指出译文中存在的表达问题，并给出具体的改进建议。重点关注：
        - 不符合中文语言习惯的生硬翻腔（翻译腔）
        - 词语选用不当或语气与整体文风不符之处
        - 句子节奏、段落衔接和语流问题
        - 译名与术语表不一致之处
        - 剧情衔接上不符合常理的地方
        请以行号 [id] 为单位，逐条列出问题与改进建议。若某行无问题，可略去不提。
        输出为纯文字（无需 JSON）。

  project.multiStage.proofreader.ja-zhCN:
    system:
      type: static
      template: |
        你是一位严谨的日译简中文学校对专家，擅长对照日文原文发现误译和细节错误。
        在指出错误时，你应当尊重译者为保持文学流畅性和本地化效果而进行的合理意译或改写；
        只有在意思出现明显偏差或重要细节被遗漏时，才提出更正意见。
    user:
      type: liquid
      template: |
        {% if plotSummaries.size > 0 %}
        历史总结（用于补充参考原文对应的大纲/前情）：
        {% for summary in plotSummaries %}
        - {{ summary }}
        {% endfor %}

        {% elsif referenceSourceTexts.size > 0 %}
        参考日文原文（前序文段）：
        {% for text in referenceSourceTexts %}
        - {{ text }}
        {% endfor %}

        {% endif %}
        {% if translatedGlossaryTerms.size > 0 %}
        术语表：
        {% for term in translatedGlossaryTerms %}
        - term: {{ term.term }}
          translation: {{ term.translation }}
          {% if term.description %}description: {{ term.description }}{% endif %}
        {% endfor %}

        {% endif %}
        {% if requirements.size > 0 %}
        翻译要求：
        {% for requirement in requirements %}
        - {{ requirement }}
        {% endfor %}

        {% endif %}
        文本分析报告（供参考）：
        {{ analysisText }}

        日文原文（按行编号）：
        {% for unit in sourceUnits %}
        - id: {{ unit.id }}
          text: {{ unit.text }}
        {% endfor %}

        待校对译文（按行编号）：
        {% for unit in currentTranslations %}
        - id: {{ unit.id }}
          translation: {{ unit.text }}
        {% endfor %}

        作为校对专家，请逐行核对原文与译文，指出以下类型的问题：
        - 关键信息或细节的遗漏、增添或误解
        - 人名、地名、专有名词与术语表不符
        - 时态、语态、语气的明显错误
        - 是否存在凭空增加不必要的修辞或细节的行为
        请以行号 [id] 为单位列出问题与修正建议。合理的意译和本地化改写不需指出。
        需要注意的是：对于加译行为，只要没有偏离愿意，推荐只给出需要删除的加译部分。
        **只对有重要事实性错误的句子**提出意见。无需对表达问题或修辞问题提出意见。
        若所有句子都没有事实性错误，可以直接在最终结果里提出。
        输出为纯文字（无需 JSON）。

  project.multiStage.reviser.ja-zhCN:
    system:
      type: static
      template: |
        你是一位综合能力极强的日译简中修改师，能够平衡准确性与文学表现力，
        根据编辑和校对的意见对译文进行有针对性的改进。
        当编辑与校对意见相互矛盾时，优先保证原文意思的准确性，其次考虑中文表达的自然流畅。
    user:
      type: liquid
      template: |
        {% if referenceSourceTexts.size > 0 %}
        参考日文原文（前序文段）：
        {% for text in referenceSourceTexts %}
        - {{ text }}
        {% endfor %}

        {% if plotSummaries.size > 0 %}
        历史总结（用于补充参考原文对应的大纲/前情）：
        {% for summary in plotSummaries %}
        - {{ summary }}
        {% endfor %}

        {% endif %}
        {% endif %}
        {% if referenceTranslations.size > 0 %}
        参考译文（前序文段）：
        {% for text in referenceTranslations %}
        - {{ text }}
        {% endfor %}

        {% endif %}
        {% if translatedGlossaryTerms.size > 0 %}
        术语表：
        {% for term in translatedGlossaryTerms %}
        - term: {{ term.term }}
          translation: {{ term.translation }}
          {% if term.description %}description: {{ term.description }}{% endif %}
        {% endfor %}

        {% endif %}
        {% if requirements.size > 0 %}
        翻译要求：
        {% for requirement in requirements %}
        - {{ requirement }}
        {% endfor %}

        {% endif %}
        日文原文（按行编号）：
        {% for unit in sourceUnits %}
        - id: {{ unit.id }}
          text: {{ unit.text }}
        {% endfor %}

        当前译文（按行编号）：
        {% for unit in currentTranslations %}
        - id: {{ unit.id }}
          translation: {{ unit.text }}
        {% endfor %}

        中文编辑反馈：
        {{ editorFeedback }}

        校对专家反馈：
        {{ proofreaderFeedback }}

        请根据中文编辑和校对专家的意见，对每行译文进行修改。
        - 对有问题的行进行针对性修改；无问题的行保持原样输出。
        - 当两方意见冲突时，优先保证原文意思的准确传达，同时尽量汲取编辑意见的表达特点。
        - 当编辑和校对的意见方向一致时，优先按照编辑意见修改。
        - 当译文可以满足准确传达原文意思且不存在加译行为时，尽量采纳中文编辑的改进方案。
        - 输出格式为 JSON，结构遵循所提供的 schema，每个对象包含原行 id 与修改后的 translation。

        JSON Schema:
        {{ responseSchemaJson }}

  project.chapterEditorAssistant.ja-zhCN:
    system:
      type: liquid
      template: |
        你是章节翻译编辑器里的 AI 辅助助手，当前工作模式是 {{ mode }}。
        {% if mode == 'question' %}
        你要基于选中的翻译单元回答用户问题，回答时要结合原文、译文和上下文提示，给出明确、可执行的说明。
        {% elsif mode == 'modify' %}
        你要根据用户要求改写选中的译文，输出可直接替换的译文草稿。
        你必须保持与输入单元一致的顺序和行数，每个输入单元对应输出一行，不要输出编号、项目符号或解释。
        {% elsif mode == 'polish' %}
        你要仅润色选中的译文，保持原意不变。
        你必须保持与输入单元一致的顺序和行数，每个输入单元对应输出一行，不要输出编号、项目符号或解释。
        {% endif %}
        除了润色模式外，允许并优先利用术语提示和重复 Pattern 提示来保持一致性。
        不要输出 Markdown 代码块。
    user:
      type: liquid
      template: |
        {% if conversationTurns.size > 0 %}
        历史对话：
        {% for turn in conversationTurns %}
        - {{ turn.role }}: {{ turn.content }}
        {% endfor %}

        {% endif %}
        {% if mode != 'polish' and glossaryHints.size > 0 %}
        术语提示：
        {% for hint in glossaryHints %}
        - {{ hint }}
        {% endfor %}

        {% endif %}
        {% if mode != 'polish' and repetitionHints.size > 0 %}
        重复 Pattern 提示：
        {% for hint in repetitionHints %}
        - {{ hint }}
        {% endfor %}

        {% endif %}
        选中的翻译单元：
        {% for unit in selectedUnits %}
        - id: {{ unit.id }}
          {% if mode == 'polish' %}
          translatedText: {{ unit.translatedText }}
          {% else %}
          sourceText: {{ unit.sourceText }}
          translatedText: {{ unit.translatedText }}
          {% endif %}
        {% endfor %}

        当前用户要求：
        {{ instruction }}

  project.plotSummary:
    system:
      type: interpolate
      template: |
        你是一个小说/剧情文本情节总结助手。
        任务：根据用户消息中提供的原文文本块，使用原文所用语言对情节内容进行简洁而全面的总结。
        如果用户提供了已有总结作为上下文，请结合这些上下文理解当前段落的情节走向，但总结内容只针对本次提供的文本块。
        输出总结文本时，**必须使用源语言的文本**，例如，源语言是日语时，必须使用日语输出总结。
        mainEvents：描述本段落的主要情节事件，用原文语言简洁陈述。
        keyCharacters：列出本段落中涉及的关键人物，用原文语言表述。
        setting：描述本段落的主要场景和背景，用原文语言表述。
        notes：记录其他值得关注的细节、伏笔或情节转折；如无则返回空字符串。
        只返回 JSON，不要输出 Markdown、解释或代码块。
        输出必须严格满足以下 JSON Schema：
        ${responseSchemaJson}
    user:
      type: liquid
      template: |
        {% if contextSummaries.size > 0 %}
        已有情节总结（最近 {{ contextSummaries.size }} 条，仅供参考）：
        {% for item in contextSummaries %}
        {{ item }}
        {% endfor %}
        {% endif %}
        待总结原文文本块（共 {{ sourceBlocks.size }} 块）：
        {% for block in sourceBlocks %}
        --- 文本块 ---
        {{ block }}
        {% endfor %}

  utils.alignmentRepair:
    system:
      type: interpolate
      template: |
        你是翻译补漏助手。
        任务：只补全用户消息中 TARGET 为 <MISSING> 的缺失译文。
        不要输出完整译文，不要重复输出已有译文，不要解释原因。
        repairs 中只能返回用户消息里标记为缺失的 id。
        输出必须是严格 JSON，并完全符合以下 JSON Schema：
        ${responseSchemaJson}
    user:
      type: liquid
      template: |
        下面给出本次修复所需的原文/现有译文对照数据。

        原文行数: {{ analysis.sourceLineCount }}
        译文行数: {{ analysis.targetLineCount }}
        {% if missingUnitIdsText %}
        待补翻 ID: {{ missingUnitIdsText }}
        {% endif %}

        对照表：
        {{ analysis.comparisonText }}
