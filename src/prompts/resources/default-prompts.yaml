version: 1
prompts:
  glossary.fullTextScan:
    system:
      type: static
      template: |
        你是一个小说/剧情文本术语扫描器。
        只提取以下五类：personName（人名）、placeName（地名）、properNoun（专有名词）、personTitle（人物称呼）、catchphrase（口癖）。
        禁止输出普通名词、动作、形容词、一般性代词、叙述性短语。
        term 必须使用原文中实际出现的写法。
        description 用简短中文说明，不超过 20 个字；如果没有必要可省略。
        输出必须是严格 JSON，格式为 {"entities":[{"term":"...","category":"personName","description":"..."}]}。
        如果没有任何结果，返回 {"entities":[]}。
        不要输出 Markdown、解释、代码块或额外文字。
    user:
      type: interpolate
      template: |
        以下是本次待扫描的全文连续行数据。
        当前行号范围：${startLineLabel} - ${endLineLabel}

        全文行内容：
        ${batchText}

  glossary.translationUpdate:
    system:
      type: interpolate
      template: |
        你是术语表译文更新器。
        任务：根据用户消息中提供的原文/译文对照，为候选未翻译术语补全能够被明确确认的译文。
        只允许依据用户消息中的原文、译文、候选术语和补充要求作答，不要依赖未提供的背景知识臆测。
        如果某个术语无法从给定译文中明确判断，就不要返回它。
        glossaryUpdates 中只能返回给定候选术语列表中的 term，不能新增其他术语。
        只返回 JSON，不要输出 Markdown、解释或代码块。
        输出必须严格满足以下 JSON Schema：
        ${responseSchemaJson}
    user:
      type: liquid
      template: |
        {% if requirements.size > 0 %}
        本次补充要求：
        {% for requirement in requirements %}
        - {{ requirement }}
        {% endfor %}

        {% endif %}
        原文与译文对照：
        {% for unit in translationUnits %}
        - id: {{ unit.id }}
          sourceText: {{ unit.sourceText }}
          translatedText: {{ unit.translatedText }}
        {% endfor %}

        候选未翻译术语：
        {% for term in untranslatedTerms %}
        - term: {{ term.term }}
          {% if term.description %}description: {{ term.description }}{% endif %}
        {% endfor %}

  project.translationPipeline:
    system:
      type: interpolate
      template: |
        你是翻译 Pipeline 的文本处理器。
        任务：翻译用户消息中提供的全部原文单元，并按原 id 返回对应译文。
        dependencyTranslations 仅作参考，不能把其中不存在于当前原文单元的内容当作本次输出。
        plotSummaries 是可选的前序情节总结参考；若未提供，说明当前任务没有可用情节大纲，此时应仅基于原文、术语表和其他已提供上下文完成翻译。
        translatedGlossaryTerms 是优先复用的既有术语译法；如果当前原文出现这些术语，应尽量保持一致。
        translations 中必须与输入 id 一一对应，不能缺失、不能重复、不能新增未请求 id。
        只返回 JSON，不要输出 Markdown、解释或代码块。
        输出必须严格满足以下 JSON Schema：
        ${responseSchemaJson}
    user:
      type: liquid
      template: |
        {% if requirements.size > 0 %}
        本次补充要求：
        {% for requirement in requirements %}
        - {{ requirement }}
        {% endfor %}

        {% endif %}
        原文单元：
        {% for unit in sourceUnits %}
        - id: {{ unit.id }}
          text: {{ unit.text }}
        {% endfor %}

        {% if dependencyTranslations.size > 0 %}
        依赖文本块译文参考：
        {% for translation in dependencyTranslations %}
        - {{ translation }}
        {% endfor %}

        {% endif %}
        {% if plotSummaries.size > 0 %}
        前序情节总结参考：
        {% for summary in plotSummaries %}
        - {{ summary }}
        {% endfor %}

        {% endif %}
        {% if translatedGlossaryTerms.size > 0 %}
        可复用术语表：
        {% for term in translatedGlossaryTerms %}
        - term: {{ term.term }}
          translation: {{ term.translation }}
          {% if term.description %}description: {{ term.description }}{% endif %}
        {% endfor %}

        {% endif %}

  project.multiStage.analyzer:
    system:
      type: static
      template: |
        你是一位精通文学翻译的分析师，熟悉跨语言文学特征、叙事手法与文化差异。
    user:
      type: liquid
      template: |
        {% if referenceSourceTexts.size > 0 %}
        参考原文（前序文段）：
        {% for text in referenceSourceTexts %}
        - {{ text }}
        {% endfor %}

        {% if plotSummaries.size > 0 %}
        历史总结（用于补充参考原文对应的大纲/前情）：
        {% for summary in plotSummaries %}
        - {{ summary }}
        {% endfor %}

        {% endif %}
        {% endif %}
        {% if referenceTranslations.size > 0 %}
        参考译文（前序文段对应译文）：
        {% for text in referenceTranslations %}
        - {{ text }}
        {% endfor %}

        {% endif %}
        {% if translatedGlossaryTerms.size > 0 %}
        术语表：
        {% for term in translatedGlossaryTerms %}
        - term: {{ term.term }}
          translation: {{ term.translation }}
          {% if term.description %}description: {{ term.description }}{% endif %}
        {% endfor %}

        {% endif %}
        {% if requirements.size > 0 %}
        翻译要求：
        {% for requirement in requirements %}
        - {{ requirement }}
        {% endfor %}

        {% endif %}
        待分析原文：
        {% for unit in sourceUnits %}
        - id: {{ unit.id }}
          text: {{ unit.text }}
        {% endfor %}

        请输出结构清晰的纯文字分析报告（无需 JSON），至少覆盖：
        1. 场景与氛围
        2. 叙事视角
        3. 文体风格与语气
        4. 翻译难点（包括文化特异性表达、人物语气、双关、隐喻及易误解细节）

  project.multiStage.translator:
    system:
      type: static
      template: |
        你是一位专业的文学翻译家，擅长将小说译成流畅自然的中文，注重保留原文的文学性与情感张力。
    user:
      type: liquid
      template: |
        {% if referenceTranslations.size > 0 %}
        参考译文（前序文段，用于保持风格一致性）：
        {% for text in referenceTranslations %}
        - {{ text }}
        {% endfor %}

        {% endif %}
        {% if translatedGlossaryTerms.size > 0 %}
        术语表：
        {% for term in translatedGlossaryTerms %}
        - term: {{ term.term }}
          translation: {{ term.translation }}
          {% if term.description %}description: {{ term.description }}{% endif %}
        {% endfor %}

        {% endif %}
        {% if requirements.size > 0 %}
        翻译要求：
        {% for requirement in requirements %}
        - {{ requirement }}
        {% endfor %}

        {% endif %}
        文本分析报告：
        {{ analysisText }}

        待翻译原文（按行编号）：
        {% for unit in sourceUnits %}
        - id: {{ unit.id }}
          text: {{ unit.text }}
        {% endfor %}

        请根据上方分析报告和参考资料，将每行原文精确译成中文。
        - 严格遵循术语表中的译名。
        - 保持与参考译文一致的文体风格。
        - 输出格式为 JSON，结构遵循所提供的 schema，每个对象包含原行 id 与 translation。

        JSON Schema:
        {{ responseSchemaJson }}

  project.multiStage.polisher:
    system:
      type: static
      template: |
        你是一位资深中文文学编辑，擅长润色译文，使其在忠实原文的基础上更加符合中文表达习惯、读来流畅自然。
    user:
      type: liquid
      template: |
        {% if referenceTranslations.size > 0 %}
        参考译文（前序文段，用于保持风格一致性）：
        {% for text in referenceTranslations %}
        - {{ text }}
        {% endfor %}

        {% endif %}
        {% if translatedGlossaryTerms.size > 0 %}
        术语表（仅译文）：
        {% for term in translatedGlossaryTerms %}
        - {{ term.translation }}{% if term.description %}（{{ term.description }}）{% endif %}
        {% endfor %}

        {% endif %}
        {% if requirements.size > 0 %}
        翻译要求：
        {% for requirement in requirements %}
        - {{ requirement }}
        {% endfor %}

        {% endif %}
        初步译文（按行编号）：
        {% for unit in currentTranslations %}
        - id: {{ unit.id }}
          translation: {{ unit.text }}
        {% endfor %}

        对应原文（仅供参照原意，不得改变核心意思）：
        {% for unit in sourceUnits %}
        - id: {{ unit.id }}
          text: {{ unit.text }}
        {% endfor %}

        请对每行译文进行润色，要求：
        - 修正不自然或生硬的中文表达，使其更符合目标读者的阅读习惯。
        - 保持与参考译文一致的文体风格。
        - 不得遗漏任何原文意思，不得增加原文没有的内容。
        - 输出格式为 JSON，结构遵循所提供的 schema，每个对象包含原行 id 与润色后的 translation。

        JSON Schema:
        {{ responseSchemaJson }}

  project.multiStage.editor:
    system:
      type: static
      template: |
        你是一位资深中文文学编辑，以中文读者的视角审稿，擅长发现译文中的表达问题并提出改进建议。
    user:
      type: liquid
      template: |
        {% if referenceTranslations.size > 0 %}
        参考译文（前序文段，体现本书整体文风）：
        {% for text in referenceTranslations %}
        - {{ text }}
        {% endfor %}

        {% endif %}
        {% if translatedGlossaryTerms.size > 0 %}
        术语表（仅译文，用于核查译名一致性）：
        {% for term in translatedGlossaryTerms %}
        - {{ term.translation }}{% if term.description %}（{{ term.description }}）{% endif %}
        {% endfor %}

        {% endif %}
        {% if requirements.size > 0 %}
        翻译要求：
        {% for requirement in requirements %}
        - {{ requirement }}
        {% endfor %}

        {% endif %}
        待审读译文（按行编号）：
        {% for unit in currentTranslations %}
        - id: {{ unit.id }}
          translation: {{ unit.text }}
        {% endfor %}

        作为中文编辑，请指出译文中存在的表达问题，并给出具体的改进建议。重点关注：
        - 不符合中文语言习惯的生硬翻腔（翻译腔）
        - 词语选用不当或语气与整体文风不符之处
        - 句子节奏、段落衔接和语流问题
        - 译名与术语表不一致之处
        请以行号 [id] 为单位，逐条列出问题与改进建议。若某行无问题，可略去不提。
        输出为纯文字（无需 JSON）。

  project.multiStage.proofreader:
    system:
      type: static
      template: |
        你是一位严谨的文学翻译校对专家，擅长对照原文发现误译和细节错误。
        在指出错误时，你应当尊重译者为保持文学流畅性和本地化效果而进行的合理意译或改写；
        只有在意思出现明显偏差或重要细节被遗漏时，才提出更正意见。
    user:
      type: liquid
      template: |
        {% if referenceSourceTexts.size > 0 %}
        参考原文（前序文段）：
        {% for text in referenceSourceTexts %}
        - {{ text }}
        {% endfor %}

        {% if plotSummaries.size > 0 %}
        历史总结（用于补充参考原文对应的大纲/前情）：
        {% for summary in plotSummaries %}
        - {{ summary }}
        {% endfor %}

        {% endif %}
        {% endif %}
        {% if translatedGlossaryTerms.size > 0 %}
        术语表：
        {% for term in translatedGlossaryTerms %}
        - term: {{ term.term }}
          translation: {{ term.translation }}
          {% if term.description %}description: {{ term.description }}{% endif %}
        {% endfor %}

        {% endif %}
        {% if requirements.size > 0 %}
        翻译要求：
        {% for requirement in requirements %}
        - {{ requirement }}
        {% endfor %}

        {% endif %}
        文本分析报告（供参考）：
        {{ analysisText }}

        原文（按行编号）：
        {% for unit in sourceUnits %}
        - id: {{ unit.id }}
          text: {{ unit.text }}
        {% endfor %}

        待校对译文（按行编号）：
        {% for unit in currentTranslations %}
        - id: {{ unit.id }}
          translation: {{ unit.text }}
        {% endfor %}

        作为校对专家，请逐行核对原文与译文，指出以下类型的问题：
        - 关键信息或细节的遗漏、增添或误解
        - 人名、地名、专有名词与术语表不符
        - 时态、语态、语气的明显错误
        请以行号 [id] 为单位列出问题与修正建议。合理的意译和本地化改写不需指出。
        若某行无问题，可略去不提。输出为纯文字（无需 JSON）。

  project.multiStage.reviser:
    system:
      type: static
      template: |
        你是一位综合能力极强的文学翻译修改师，能够平衡精准性与文学表现力，
        根据编辑和校对的意见对译文进行有针对性的改进。
        当编辑与校对意见相互矛盾时，优先保证原文意思的准确性，其次考虑中文表达的自然流畅。
    user:
      type: liquid
      template: |
        {% if referenceSourceTexts.size > 0 %}
        参考原文（前序文段）：
        {% for text in referenceSourceTexts %}
        - {{ text }}
        {% endfor %}

        {% if plotSummaries.size > 0 %}
        历史总结（用于补充参考原文对应的大纲/前情）：
        {% for summary in plotSummaries %}
        - {{ summary }}
        {% endfor %}

        {% endif %}
        {% endif %}
        {% if referenceTranslations.size > 0 %}
        参考译文（前序文段）：
        {% for text in referenceTranslations %}
        - {{ text }}
        {% endfor %}

        {% endif %}
        {% if translatedGlossaryTerms.size > 0 %}
        术语表：
        {% for term in translatedGlossaryTerms %}
        - term: {{ term.term }}
          translation: {{ term.translation }}
          {% if term.description %}description: {{ term.description }}{% endif %}
        {% endfor %}

        {% endif %}
        {% if requirements.size > 0 %}
        翻译要求：
        {% for requirement in requirements %}
        - {{ requirement }}
        {% endfor %}

        {% endif %}
        原文（按行编号）：
        {% for unit in sourceUnits %}
        - id: {{ unit.id }}
          text: {{ unit.text }}
        {% endfor %}

        当前译文（按行编号）：
        {% for unit in currentTranslations %}
        - id: {{ unit.id }}
          translation: {{ unit.text }}
        {% endfor %}

        中文编辑反馈：
        {{ editorFeedback }}

        校对专家反馈：
        {{ proofreaderFeedback }}

        请根据中文编辑和校对专家的意见，对每行译文进行修改。
        - 对有问题的行进行针对性修改；无问题的行保持原样输出。
        - 当两方意见冲突时，优先保证原文意思的准确传达，同时尽量兼顾中文表达的自然流畅。
        - 输出格式为 JSON，结构遵循所提供的 schema，每个对象包含原行 id 与修改后的 translation。

        JSON Schema:
        {{ responseSchemaJson }}

  project.plotSummary:
    system:
      type: interpolate
      template: |
        你是一个小说/剧情文本情节总结助手。
        任务：根据用户消息中提供的原文文本块，使用原文所用语言对情节内容进行简洁而全面的总结。
        如果用户提供了已有总结作为上下文，请结合这些上下文理解当前段落的情节走向，但总结内容只针对本次提供的文本块。
        mainEvents：描述本段落的主要情节事件，用原文语言简洁陈述。
        keyCharacters：列出本段落中涉及的关键人物，用原文语言表述。
        setting：描述本段落的主要场景和背景，用原文语言表述。
        notes：记录其他值得关注的细节、伏笔或情节转折；如无则返回空字符串。
        只返回 JSON，不要输出 Markdown、解释或代码块。
        输出必须严格满足以下 JSON Schema：
        ${responseSchemaJson}
    user:
      type: liquid
      template: |
        {% if contextSummaries.size > 0 %}
        已有情节总结（最近 {{ contextSummaries.size }} 条，仅供参考）：
        {% for item in contextSummaries %}
        {{ item }}
        {% endfor %}
        {% endif %}
        待总结原文文本块（共 {{ sourceBlocks.size }} 块）：
        {% for block in sourceBlocks %}
        --- 文本块 ---
        {{ block }}
        {% endfor %}

  utils.alignmentRepair:
    system:
      type: interpolate
      template: |
        你是翻译补漏助手。
        任务：只补全用户消息中 TARGET 为 <MISSING> 的缺失译文。
        不要输出完整译文，不要重复输出已有译文，不要解释原因。
        repairs 中只能返回用户消息里标记为缺失的 id。
        输出必须是严格 JSON，并完全符合以下 JSON Schema：
        ${responseSchemaJson}
    user:
      type: liquid
      template: |
        下面给出本次修复所需的原文/现有译文对照数据。

        原文行数: {{ analysis.sourceLineCount }}
        译文行数: {{ analysis.targetLineCount }}
        {% if missingUnitIdsText %}
        待补翻 ID: {{ missingUnitIdsText }}
        {% endif %}

        对照表：
        {{ analysis.comparisonText }}
